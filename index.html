    <script type="application/ld+json">

        {
          "@type": "Question",
          "name": "O que uma agência de IA faz na prática?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Encontra onde sua operação perde tempo e dinheiro e resolve com tecnologia: atendimento que responde sozinho, processos que rodam sem ninguém empurrar, marca e aquisição organizadas. Na Feed isso começa com um diagnóstico da operação e termina com a solução implementada e rodando na sua rotina."
          }
        },
        {
          "@type": "Question",
          "name": "Quanto custa implementar IA numa pequena empresa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Depende do tamanho do buraco. Ferramentas prontas custam de R$100 a R$500 por mês. Um agente de IA no WhatsApp bem implementado fica entre R$8 mil e R$25 mil, mais uma mensalidade. O caminho certo é começar pequeno, com um projeto que se paga em poucos meses. No diagnóstico a gente mostra a faixa real pro seu caso."
          }
        },
        {
          "@type": "Question",
          "name": "Automação de WhatsApp não vai irritar meus clientes?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Robô burro irrita. Automação bem feita responde na hora, resolve o que é simples e passa pro humano quando a conversa pede. Seu cliente ganha resposta imediata e seu time para de perder o dia repetindo a mesma informação."
          }
        },
        {
          "@type": "Question",
          "name": "Preciso de time de TI pra usar IA na empresa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não. A Feed implementa, treina quem vai usar e acompanha a solução funcionando. Você não precisa contratar ninguém nem entender de tecnologia: precisa saber onde sua operação trava, e isso a gente descobre junto."
          }
        },
        {
          "@type": "Question",
          "name": "Em quanto tempo vejo resultado?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Automação de atendimento começa a trabalhar em semanas. Posicionamento e aquisição aparecem em 2 a 3 meses. Bons projetos de IA costumam se pagar entre 4 e 8 meses. A gente prefere entrega rápida e escopo enxuto a projeto grande que nunca termina."
          }
        },
        {
          "@type": "Question",
          "name": "A Feed atende só a região de Ribeirão Preto?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A base é a região de Ribeirão Preto e Bebedouro, no interior de SP, com atendimento presencial quando faz sentido. Boa parte dos clientes a gente atende 100% remoto, em qualquer lugar do Brasil."
          }
        },
        {
          "@type": "Question",
          "name": "O que é o diagnóstico gratuito?",
          "acceptedAnswer": {

          }
        }
      ]
