<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="A Feed aplica IA, marca e soluções práticas para empresas B2B que precisam organizar operação, comunicação e crescimento."
    />
    <title>Feed | IA, marca e soluções para empresas</title>
  </head>
  <body>
    <script>
      if (!window.location.hash) {
        window.history.scrollRestoration = "manual";
        window.scrollTo(0, 0);
      }
    </script>
    <form name="feed-quiz" method="POST" netlify data-netlify="true" action="/feed-quiz-form.html" hidden>
      <input type="hidden" name="form-name" value="feed-quiz" />
      <input type="text" name="company" />
      <input type="text" name="market" />
      <textarea name="stage"></textarea>
      <textarea name="digitalPresence"></textarea>
      <textarea name="priority"></textarea>
      <textarea name="rawAnswers"></textarea>
      <input type="text" name="pageUrl" />
      <input type="text" name="submittedAt" />
      <input type="text" name="userAgent" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
