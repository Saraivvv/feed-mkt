<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex" />
    <title>Feed Quiz Form</title>
  </head>
  <body>
    <form name="feed-quiz" method="POST" netlify data-netlify="true" action="/feed-quiz-form.html">
      <input type="hidden" name="form-name" value="feed-quiz" />
      <input type="text" name="company" />
      <input type="text" name="market" />
      <textarea name="stage"></textarea>
      <textarea name="digitalPresence"></textarea>
      <textarea name="priority"></textarea>
      <textarea name="rawAnswers"></textarea>
      <input type="text" name="pageUrl" />
      <input type="text" name="submittedAt" />
      <input type="text" name="userAgent" />
      <button type="submit">Enviar</button>
    </form>
  </body>
</html>
